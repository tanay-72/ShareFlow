databases:
  - name: shareflow-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: shareflow-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: shareflow-db
          property: connectionString
      - key: APP_SECRET
        generateValue: true
      # Fill these in after the first deploy, once Render has assigned
      # *.onrender.com hostnames (or you've attached custom domains) to
      # shareflow-api and shareflow-web below.
      - key: PUBLIC_APP_URL
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: STORAGE_PROVIDER
        value: b2
      # Backblaze B2 credentials (S3-compatible Application Key) — create a
      # bucket + application key in the Backblaze dashboard, then fill
      # these in via the Render dashboard (not stored in this file / git).
      - key: B2_ENDPOINT
        sync: false
      - key: B2_ACCESS_KEY_ID
        sync: false
      - key: B2_SECRET_ACCESS_KEY
        sync: false
      - key: B2_BUCKET
        sync: false
      - key: UPLOAD_RATE_LIMIT_PER_HOUR
        value: "100"
      - key: DOWNLOAD_RATE_LIMIT_PER_HOUR
        value: "300"
      - key: CLEANUP_CRON_INTERVAL_MINUTES
        value: "15"

  # shareflow-worker (background cleanup job) is intentionally not defined
  # here — Render's free tier has no instance type for "type: worker"
  # services (Starter, ~$7/mo minimum, is the cheapest that supports it).
  # Until it's added back, expired/one-time-download files and abandoned
  # upload sessions won't be automatically purged. To add it back later,
  # either (a) add a `type: worker` service reusing apps/api/Dockerfile
  # with `dockerCommand: node dist/worker.main.js` on a paid plan, or
  # (b) convert CleanupService to a single-pass entrypoint and run it as a
  # Render Cron Job instead, which bills per execution-second rather than
  # 24/7.

  - type: web
    name: shareflow-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      # Vite bakes this in at build time. The web Dockerfile declares
      # `ARG VITE_API_BASE_URL`, so Render forwards this env var as a
      # docker build-arg automatically. Fill in with shareflow-api's URL
      # after the first deploy.
      - key: VITE_API_BASE_URL
        sync: false
